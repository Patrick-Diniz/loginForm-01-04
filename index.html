<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Login baseado no Figma</title>
    <script src="https://kit.fontawesome.com/87326f7ef6.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <form>
            <h2>Create An Account</h2>
            <h3>Create an account to enjoy all the services without any ads for free!</h3>
            <input type="text" name="email" placeholder="Insira seu email">
            <input type="password" name="password" placeholder="Insira sua senha">
            <input type="submit" name="acao" value="Entrar">
            <div class="social">
                <h3>Or sign with your social medias</h3>
            </div>
            <div class="icons">
                <div class="f-icon">
                <a href="">
                    <i class="facebook fab fa-facebook-f"></i>
                    Sign in with Facebook
                </a>
            </div>
            <div class="t-icon">
                <a href="">
                    <i class="fab fa-twitter"></i>
                    Sign in with Twitter
                </a>
            </div>
        </div>
        </form>
    </div>
</body>
</html>
